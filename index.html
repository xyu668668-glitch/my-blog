<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — 思考与记录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f7f5f0;
      --card: #ffffff;
      --text: #1c1c1c;
      --text-muted: #888;
      --accent: #c07a4f;
      --accent-light: #f3ebe3;
      --border: #e8e4de;
      --tag-bg: #f0ece4;
      --tag-text: #8a6d5a;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    .serif { font-family: 'Noto Serif SC', Georgia, serif; }

    /* ── Navigation ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(247,245,240,0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 40px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-brand {
      font-family: 'Noto Serif SC', serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.5px;
    }

    .nav-links { display: flex; gap: 36px; align-items: center; }

    .nav-links a {
      text-decoration: none;
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      transition: color 0.2s;
      cursor: pointer;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--text); }

    /* ── Layout ── */
    main { max-width: 1100px; margin: 0 auto; padding: 0 40px 80px; }

    /* ── Hero ── */
    .hero {
      padding: 80px 0 60px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 72px;
    }

    .hero-eyebrow {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .hero-eyebrow::after {
      content: '';
      display: block;
      width: 32px;
      height: 1px;
      background: var(--accent);
    }

    .hero h1 {
      font-family: 'Noto Serif SC', serif;
      font-size: clamp(36px, 5vw, 60px);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -1.5px;
      max-width: 760px;
      margin-bottom: 28px;
    }

    .hero-desc {
      font-size: 17px;
      color: var(--text-muted);
      max-width: 540px;
      line-height: 1.8;
    }

    /* ── Section label ── */
    .section-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 36px;
    }

    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
    }

    .section-count {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ── Post list ── */
    .post-list { display: flex; flex-direction: column; gap: 0; }

    .post-card {
      display: grid;
      grid-template-columns: 120px 1fr auto;
      gap: 0 40px;
      align-items: start;
      padding: 36px 0;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      transition: background 0.2s;
      cursor: pointer;
    }

    .post-card:hover .post-title { color: var(--accent); }

    .post-date-block { padding-top: 4px; }

    .post-day {
      font-family: 'Noto Serif SC', serif;
      font-size: 40px;
      font-weight: 700;
      line-height: 1;
      color: var(--border);
      letter-spacing: -2px;
      transition: color 0.3s;
    }
    .post-card:hover .post-day { color: var(--accent-light); }

    .post-month-year {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 1px;
      margin-top: 4px;
    }

    .post-body {}

    .post-tag {
      display: inline-block;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--tag-text);
      background: var(--tag-bg);
      padding: 3px 10px;
      border-radius: 2px;
      margin-bottom: 10px;
    }

    .post-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 22px;
      font-weight: 600;
      line-height: 1.4;
      letter-spacing: -0.3px;
      margin-bottom: 10px;
      transition: color 0.25s;
    }

    .post-excerpt {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.75;
      max-width: 580px;
    }

    .post-arrow {
      font-size: 20px;
      color: var(--border);
      align-self: center;
      transition: color 0.2s, transform 0.2s;
      padding-left: 20px;
    }
    .post-card:hover .post-arrow {
      color: var(--accent);
      transform: translateX(4px);
    }

    /* ── Divider ── */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 72px 0 48px;
    }
    .section-divider::before {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .section-divider span {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Feature post ── */
    .feature-card {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 64px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      transition: box-shadow 0.3s;
    }
    .feature-card:hover { box-shadow: 0 8px 40px rgba(0,0,0,0.08); }

    .feature-visual {
      background: var(--accent-light);
      min-height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .feature-visual::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 40%, rgba(192,122,79,0.15) 0%, transparent 70%);
    }

    .feature-visual-text {
      font-family: 'Noto Serif SC', serif;
      font-size: 80px;
      font-weight: 700;
      color: rgba(192,122,79,0.18);
      user-select: none;
    }

    .feature-body { padding: 48px 48px 48px 0; display: flex; flex-direction: column; justify-content: center; }

    .feature-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .feature-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 26px;
      font-weight: 700;
      line-height: 1.4;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
    }

    .feature-excerpt {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.8;
      margin-bottom: 28px;
    }

    .feature-meta {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .feature-date { font-size: 12px; color: var(--text-muted); }

    .feature-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--accent);
      text-decoration: none;
    }
    .feature-cta::after { content: '→'; }

    /* ── About ── */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .about-text h2 {
      font-family: 'Noto Serif SC', serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 20px;
    }

    .about-text p {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.85;
      margin-bottom: 16px;
    }

    .about-aside {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 36px;
    }

    .aside-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .stat-list { display: flex; flex-direction: column; gap: 20px; }

    .stat-item { display: flex; flex-direction: column; gap: 4px; }

    .stat-value {
      font-family: 'Noto Serif SC', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -1px;
    }

    .stat-label { font-size: 12px; color: var(--text-muted); }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 40px;
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-brand {
      font-family: 'Noto Serif SC', serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .footer-copy {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ── Post detail ── */
    #post-detail { display: none; }
    #post-detail.active { display: block; }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      text-decoration: none;
      margin-bottom: 56px;
      padding-top: 48px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent); }
    .back-link::before { content: '←'; }

    .post-header { margin-bottom: 48px; padding-bottom: 40px; border-bottom: 1px solid var(--border); }

    .post-header .post-tag { margin-bottom: 20px; }

    .post-header h1 {
      font-family: 'Noto Serif SC', serif;
      font-size: clamp(28px, 4vw, 48px);
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1.2;
      margin-bottom: 20px;
    }

    .post-header .post-meta {
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      gap: 16px;
    }

    .post-body { font-size: 17px; line-height: 1.9; max-width: 720px; }
    .post-body p { margin-bottom: 24px; }
    .post-body h2 {
      font-family: 'Noto Serif SC', serif;
      font-size: 24px;
      font-weight: 700;
      margin: 48px 0 16px;
      letter-spacing: -0.3px;
    }
    .post-body ul, .post-body ol { margin: 16px 0 24px 24px; }
    .post-body li { margin-bottom: 8px; }
    .post-body blockquote {
      border-left: 2px solid var(--accent);
      padding: 14px 24px;
      background: var(--accent-light);
      margin: 32px 0;
      font-family: 'Noto Serif SC', serif;
      font-size: 18px;
      line-height: 1.7;
      color: var(--text);
      border-radius: 0 3px 3px 0;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .nav-inner, main, footer { padding-left: 20px; padding-right: 20px; }
      .hero { padding: 48px 0 40px; }
      .hero h1 { font-size: 32px; }
      .post-card { grid-template-columns: 1fr; gap: 12px; }
      .post-day { font-size: 28px; color: var(--accent-light); }
      .post-arrow { display: none; }
      .feature-card { grid-template-columns: 1fr; }
      .feature-visual { min-height: 200px; }
      .feature-body { padding: 32px; }
      .about-grid { grid-template-columns: 1fr; }
    }

    [hidden] { display: none !important; }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="#" class="nav-brand serif" onclick="showHome(); return false;">Blog.</a>
    <div class="nav-links">
      <a href="#" class="active" onclick="showHome(); return false;">文章</a>
      <a href="#" onclick="showAbout(); return false;">关于</a>
    </div>
  </div>
</nav>

<main>
  <!-- Home -->
  <div id="home-view">
    <div class="hero">
      <div class="hero-eyebrow">思考 · 记录 · 成长</div>
      <h1 class="serif">在碎片中寻找<br>值得留下的东西</h1>
      <p class="hero-desc">工作心得、技术探索与生活感悟。每一篇文章都是一次认真的梳理。</p>
    </div>

    <div class="section-label">
      <span class="section-title">近期文章</span>
      <span class="section-count">共 <span id="post-count">0</span> 篇</span>
    </div>

    <div class="post-list" id="post-list"></div>

    <div class="section-divider"><span>关于</span></div>

    <div class="about-grid">
      <div class="about-text">
        <h2 class="serif">关于这个博客</h2>
        <p>这里记录我在工作与生活交叉地带的思考——行政执法法制审核的数字化探索，个人效率工具的折腾，以及偶尔的读书笔记。</p>
        <p>用 AI 和工具把重复的事变简单，然后把省下来的时间花在真正值得的事情上。</p>
      </div>
      <div class="about-aside">
        <div class="aside-title">站点信息</div>
        <div class="stat-list">
          <div class="stat-item">
            <span class="stat-value">2026</span>
            <span class="stat-label">建于</span>
          </div>
          <div class="stat-item">
            <span class="stat-value">重庆</span>
            <span class="stat-label">所在地</span>
          </div>
          <div class="stat-item">
            <span class="stat-value">WorkBuddy + AI</span>
            <span class="stat-label">构建工具</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Post detail -->
  <div id="post-detail">
    <a href="#" class="back-link" onclick="showHome(); return false;">返回列表</a>
    <div id="post-content"></div>
  </div>
</main>

<footer>
  <span class="footer-brand serif">Blog.</span>
  <span class="footer-copy">© 2026 · 用心写，每一篇</span>
</footer>

<script>
const posts = [
  {
    id: 1,
    title: "用 AI 工具提升行政执法法制审核效率的实践",
    date: "2026-04-15",
    tag: "工作",
    excerpt: "结合法律知识库与 AI 辅助审查工具，探索法制审核工作的数字化转型路径，从重复性工作中解放出来。",
    content: `
      <p>行政执法法制审核是基层法制工作的核心环节，涉及大量法律条文的检索、案例的比对以及文书格式的核对。传统方式效率低、易出错，AI 工具的引入可以显著改善这一状况。</p>
      <h2>核心痛点</h2>
      <ul>
        <li>法条检索依赖人工翻查，耗时长</li>
        <li>同类案件裁量标准不一致</li>
        <li>文书格式不规范问题反复出现</li>
      </ul>
      <h2>AI 辅助方案</h2>
      <p>通过建立结构化的法律知识库，配合 AI 问答接口，可以实现：法条的快速定位、裁量基准的智能提示、文书格式的自动检查。这套方案已在实际工作中验证，效果明显。</p>
      <blockquote>工具只是手段，核心还是人。用好 AI 工具的关键在于，知道什么时候用它，什么时候不该用它。</blockquote>
      <h2>下一步计划</h2>
      <p>继续完善知识库内容，积累更多典型案例，形成可直接调用的执法参考模板。</p>
    `
  },
  {
    id: 2,
    title: "从零搭建个人投资追踪系统：工具选型与实践",
    date: "2026-04-08",
    tag: "投资",
    excerpt: "用 Python + Web 工具搭建个人投资组合追踪系统，自动化获取行情数据，告别手动记录。",
    content: `
      <p>投资是一件需要长期坚持的事，而数据的记录和追踪往往是最费时间的环节。我花了几天时间，用 AI 辅助搭建了一套自动化投资追踪系统，现在每天只需要打开网页就能看到所有持仓情况。</p>
      <h2>工具选型</h2>
      <p>核心数据源选择了 AkShare 和东方财富 API，行情数据免费且覆盖全面。前端用简单的 HTML + Chart.js 展示图表，后端用 Python 脚本定时更新数据。</p>
      <h2>核心功能</h2>
      <ul>
        <li>持仓收益实时计算</li>
        <li>250日均线偏离度可视化</li>
        <li>RSI 超买超卖提示</li>
        <li>每日红绿灯评分卡</li>
      </ul>
      <blockquote>投资系统是为自己服务的，不需要追求花哨，核心数据清晰直观就够了。</blockquote>
      <h2>踩过的坑</h2>
      <p>前复权数据计算均线时要格外注意，否则历史数据会失真。另外 API 有频率限制，定时任务间隔不要太短。</p>
    `
  },
  {
    id: 3,
    title: "Mac mini + 极空间 NAS：我的个人数字中枢",
    date: "2026-03-28",
    tag: "效率",
    excerpt: "Mac mini M4 作为主力工作机，极空间 NAS 负责存储与媒体管理，这套组合用了半年，聊聊真实感受。",
    content: `
      <p>去年入手了 Mac mini M4，配合极空间 NAS Z4，用了大半年，组合超出预期，记录一下真实使用感受。</p>
      <h2>为什么选 Mac mini</h2>
      <p>M4 芯片性能强，功耗低，Mac mini 体积小不占地方，性价比在 Mac 产品线里最高。8G 内存日常办公够用，有条件建议上 16G。</p>
      <h2>极空间 NAS 的价值</h2>
      <p>Radarr/Sonarr 自动追剧追电影，Jellyfin 做媒体中心，Jellyseerr 做请求管理。这套自动化媒体库体验比任何流媒体都爽。</p>
      <h2>数据备份策略</h2>
      <p>重要文件用 Mac 自带 Time Machine 备份到 NAS，另外用 rclone 定期同步到阿里云 OSS，冷备一份。重要工作文件三重保护。</p>
      <blockquote>NAS 是那个"买了之后才发现早就需要"的东西。</blockquote>
    `
  },
  {
    id: 4,
    title: "博客上线全流程：零基础也能做网站",
    date: "2026-03-20",
    tag: "技术",
    excerpt: "注册 GitHub、安装 GitHub Desktop、推到远程仓库、Vercel 部署上线——完整流程记录，从零到上线只需要半天。",
    content: `
      <p>很多人觉得做网站是技术活，其实现在有了 AI 辅助，最难的那部分已经有人帮你做了。这篇文章记录了我从零开始建博客的完整流程。</p>
      <h2>需要准备的东西</h2>
      <ul>
        <li>一个 GitHub 账号（免费）</li>
        <li>GitHub Desktop（免费，图形界面）</li>
        <li>一个 Vercel 账号（免费）</li>
        <li>一个域名（可选，约50元/年）</li>
      </ul>
      <h2>核心步骤</h2>
      <p>第一步用 AI 生成网站代码，第二步用 GitHub Desktop 推送到仓库，第三步 Vercel 读取 GitHub 仓库自动构建部署。全程不需要写代码，不需要敲命令行。</p>
      <blockquote>不要等准备好了再开始，先跑通最小闭环，再迭代优化。</blockquote>
      <h2>总费用</h2>
      <p>如果用 Vercel 免费额度托管，网站本身不花钱。只需要一个域名（可选），50元/年。如果用腾讯云香港服务器，月均30元左右。</p>
    `
  }
];

function formatDate(dateStr) {
  const [y, m, d] = dateStr.split('-');
  return { day: d, monthYear: `${y}年${m}月` };
}

function renderPostList() {
  const container = document.getElementById('post-list');
  document.getElementById('post-count').textContent = posts.length;
  container.innerHTML = posts.map(p => {
    const { day, monthYear } = formatDate(p.date);
    return `
      <div class="post-card" onclick="showPost(${p.id})">
        <div class="post-date-block">
          <div class="post-day">${day}</div>
          <div class="post-month-year">${monthYear}</div>
        </div>
        <div class="post-body">
          <span class="post-tag">${p.tag}</span>
          <div class="post-title serif">${p.title}</div>
          <div class="post-excerpt">${p.excerpt}</div>
        </div>
        <div class="post-arrow">→</div>
      </div>
    `;
  }).join('');
}

function showHome() {
  document.getElementById('home-view').style.display = '';
  document.getElementById('post-detail').style.display = 'none';
  document.getElementById('post-detail').classList.remove('active');
  document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
  document.querySelector('.nav-links a').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showAbout() {
  document.getElementById('home-view').style.display = '';
  document.getElementById('post-detail').style.display = 'none';
  document.getElementById('post-detail').classList.remove('active');
  document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
  document.querySelectorAll('.nav-links a')[1].classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showPost(id) {
  const post = posts.find(p => p.id === id);
  if (!post) return;
  document.getElementById('post-content').innerHTML = `
    <div class="post-header">
      <span class="post-tag">${post.tag}</span>
      <h1 class="serif">${post.title}</h1>
      <div class="post-meta">
        <span>${post.date}</span>
      </div>
    </div>
    <div class="post-body">${post.content}</div>
  `;
  document.getElementById('home-view').style.display = 'none';
  document.getElementById('post-detail').style.display = '';
  document.getElementById('post-detail').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderPostList();
</script>

</body>
</html>
