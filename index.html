<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — 思考与记录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0c0e14;
      --card: #13161f;
      --card-hover: #1a1e2c;
      --text: #e8eaf0;
      --text-muted: #6b7280;
      --accent: #4fc3f7;
      --accent-dim: rgba(79,195,247,0.12);
      --border: rgba(255,255,255,0.08);
      --tag-bg: rgba(79,195,247,0.1);
      --tag-text: #4fc3f7;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    .serif { font-family: 'Noto Serif SC', Georgia, serif; }

    /* ── Hero ── */
    .hero {
      position: relative;
      height: 100vh;
      min-height: 640px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&q=85&fit=crop');
      background-size: cover;
      background-position: center;
      transform: scale(1.05);
      transition: transform 8s ease-out;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(12,14,20,0.2) 0%,
        rgba(12,14,20,0.55) 50%,
        rgba(12,14,20,0.92) 100%
      );
    }

    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 760px;
      padding: 0 24px;
      animation: heroIn 1.2s ease-out both;
    }

    @keyframes heroIn {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero-eyebrow {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .hero-eyebrow::before, .hero-eyebrow::after {
      content: '';
      width: 40px;
      height: 1px;
      background: var(--accent);
      opacity: 0.5;
    }

    .hero h1 {
      font-family: 'Noto Serif SC', serif;
      font-size: clamp(36px, 6vw, 72px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -2px;
      margin-bottom: 20px;
      color: #ffffff;
    }

    .hero-desc {
      font-size: 16px;
      color: rgba(255,255,255,0.6);
      max-width: 500px;
      margin: 0 auto 40px;
      line-height: 1.8;
    }

    /* Search bar */
    .hero-search {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50px;
      padding: 12px 20px;
      max-width: 440px;
      margin: 0 auto;
      gap: 12px;
      backdrop-filter: blur(12px);
      transition: border-color 0.3s, background 0.3s;
    }

    .hero-search:focus-within {
      border-color: var(--accent);
      background: rgba(79,195,247,0.06);
    }

    .hero-search svg { color: var(--text-muted); flex-shrink: 0; }

    .hero-search input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-size: 14px;
      color: var(--text);
    }

    .hero-search input::placeholder { color: rgba(255,255,255,0.3); }

    .hero-scroll {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.3);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: scrollBounce 2s ease-in-out infinite;
    }

    .hero-scroll-line {
      width: 1px;
      height: 48px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.4), transparent);
    }

    @keyframes scrollBounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(6px); }
    }

    /* ── Section ── */
    .section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 40px 80px;
    }

    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 36px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .section-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .section-more {
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: gap 0.2s;
    }
    .section-more:hover { gap: 8px; }

    /* ── Cards ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
    }

    .card:hover {
      border-color: rgba(79,195,247,0.3);
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.4);
    }

    .card-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
      filter: brightness(0.85);
      transition: filter 0.3s, transform 0.5s;
    }

    .card:hover .card-img { filter: brightness(0.95); transform: scale(1.03); }

    .card-img-wrap {
      overflow: hidden;
      position: relative;
    }

    .card-img-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: linear-gradient(to top, var(--card), transparent);
    }

    .card-tag {
      position: absolute;
      top: 12px;
      left: 12px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #fff;
      background: rgba(79,195,247,0.8);
      backdrop-filter: blur(8px);
      padding: 4px 10px;
      border-radius: 3px;
    }

    .card-body { padding: 20px 22px 24px; }

    .card-date {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }

    .card-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 17px;
      font-weight: 600;
      line-height: 1.45;
      letter-spacing: -0.2px;
      margin-bottom: 10px;
      transition: color 0.2s;
    }

    .card:hover .card-title { color: var(--accent); }

    .card-excerpt {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.7;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Author strip ── */
    .author-strip {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      display: grid;
      grid-template-columns: 80px 1fr auto;
      gap: 28px;
      align-items: center;
      margin-bottom: 80px;
    }

    .author-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border);
    }

    .author-info h3 {
      font-family: 'Noto Serif SC', serif;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .author-info p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .author-stats {
      display: flex;
      gap: 32px;
    }

    .author-stat { text-align: center; }
    .author-stat-num {
      font-family: 'Noto Serif SC', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
    }
    .author-stat-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1200px;
      margin: 0 auto;
    }

    .footer-brand {
      font-family: 'Noto Serif SC', serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .footer-copy { font-size: 12px; color: var(--text-muted); }

    /* ── Post detail ── */
    #post-detail { display: none; }
    #post-detail.active { display: block; }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      text-decoration: none;
      margin-bottom: 48px;
      padding-top: 60px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent); }
    .back-link::before { content: '←'; }

    .post-hero {
      position: relative;
      height: 420px;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 48px;
    }

    .post-hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.6);
    }

    .post-hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(12,14,20,0.8) 0%, transparent 60%);
      display: flex;
      align-items: flex-end;
      padding: 40px;
    }

    .post-hero-text { position: relative; z-index: 1; }

    .post-hero .post-tag {
      display: inline-block;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #fff;
      background: rgba(79,195,247,0.8);
      padding: 4px 12px;
      border-radius: 3px;
      margin-bottom: 16px;
    }

    .post-hero h1 {
      font-family: 'Noto Serif SC', serif;
      font-size: clamp(24px, 4vw, 42px);
      font-weight: 700;
      line-height: 1.2;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .post-header { margin-bottom: 40px; padding-bottom: 32px; border-bottom: 1px solid var(--border); }
    .post-header .post-tag { display: inline-block; font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--tag-text); background: var(--tag-bg); padding: 4px 12px; border-radius: 3px; margin-bottom: 16px; }
    .post-header h1 { font-family: 'Noto Serif SC', serif; font-size: clamp(28px, 4vw, 48px); font-weight: 700; letter-spacing: -1px; line-height: 1.2; margin-bottom: 16px; }
    .post-header .post-meta { font-size: 13px; color: var(--text-muted); }

    .post-body { font-size: 17px; line-height: 1.9; max-width: 720px; }
    .post-body p { margin-bottom: 24px; }
    .post-body h2 { font-family: 'Noto Serif SC', serif; font-size: 24px; font-weight: 700; margin: 48px 0 16px; letter-spacing: -0.3px; }
    .post-body ul, .post-body ol { margin: 16px 0 24px 24px; }
    .post-body li { margin-bottom: 8px; }
    .post-body blockquote {
      border-left: 2px solid var(--accent);
      padding: 14px 24px;
      background: var(--accent-dim);
      margin: 32px 0;
      border-radius: 0 4px 4px 0;
      font-family: 'Noto Serif SC', serif;
      font-size: 18px;
      line-height: 1.7;
      color: var(--text);
    }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .cards-grid { grid-template-columns: repeat(2, 1fr); }
      .author-strip { grid-template-columns: 1fr; }
      .author-stats { justify-content: flex-start; }
    }

    @media (max-width: 600px) {
      .section, footer { padding-left: 20px; padding-right: 20px; }
      .cards-grid { grid-template-columns: 1fr; }
      .hero h1 { font-size: 32px; }
      .author-strip { padding: 28px; }
    }

    [hidden] { display: none !important; }
  </style>
</head>

<!-- Hero -->
<div class="hero">

</div>

<footer>

  <div id="post-content"></div>
</div>

      <h2>核心步骤</h2>
      <p>第一步用 AI 生成网站代码，第二步用 GitHub Desktop 推送到仓库，第三步 Vercel 读取 GitHub 仓库自动构建部署。全程不需要写代码，不需要敲命令行。</p>
      <blockquote>不要等准备好了再开始，先跑通最小闭环，再迭代优化。</blockquote>
      <h2>总费用</h2>
      <p>如果用 Vercel 免费额度托管，网站本身不花钱。只需要一个域名（可选），50元/年。如果用腾讯云香港服务器，月均30元左右。</p>
    `
  }
];

const postHeroImages = [
  'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1200&q=85&fit=crop',
  'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1200&q=85&fit=crop',
  'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=1200&q=85&fit=crop',
  'https://images.unsplash.com/photo-1454496522488-7a8e488e8606?w=1200&q=85&fit=crop',
];

function renderCards() {
  const grid = document.getElementById('cards-grid');
  document.getElementById('post-count').textContent = posts.length;
  document.getElementById('post-count-2').textContent = posts.length;
  grid.innerHTML = posts.map((p, i) => `
    <div class="card" onclick="showPost(${p.id})">
      <div class="card-img-wrap">
        <img class="card-img" src="${cardImages[i % cardImages.length]}" alt="${p.title}" loading="lazy">
        <div class="card-img-overlay"></div>
        <span class="card-tag">${p.tag}</span>
      </div>
      <div class="card-body">
        <div class="card-date">${p.date}</div>
        <div class="card-title serif">${p.title}</div>
        <div class="card-excerpt">${p.excerpt}</div>
      </div>
    </div>
  `).join('');
}

function showHome() {
  document.querySelector('.hero').style.display = '';
  document.querySelector('.section').closest('main') || document.querySelector('.hero').nextElementSibling.style.display = '';
  document.getElementById('post-detail').style.display = 'none';
  document.getElementById('post-detail').classList.remove('active');
  document.querySelectorAll('.section').forEach(s => s.style.display = '');
  document.querySelector('footer').style.display = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showPost(id) {
  const idx = posts.findIndex(p => p.id === id);
  const post = posts[idx];
  if (!post) return;
  document.getElementById('post-content').innerHTML = `
    <div class="post-hero">
      <img src="${postHeroImages[idx % postHeroImages.length]}" alt="${post.title}">
      <div class="post-hero-overlay">
        <div class="post-hero-text">
          <div class="post-tag">${post.tag}</div>
          <h1 class="serif">${post.title}</h1>
        </div>
      </div>
    </div>
    <div class="post-header">
      <div class="post-tag">${post.tag}</div>
      <h1 class="serif">${post.title}</h1>
      <div class="post-meta">${post.date}</div>
    </div>
    <div class="post-body">${post.content}</div>
  `;
  document.querySelector('.hero').style.display = 'none';
  document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
  document.querySelector('footer').style.display = 'none';
  document.getElementById('post-detail').style.display = '';
  document.getElementById('post-detail').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderCards();
</script>

</body>
</html>
